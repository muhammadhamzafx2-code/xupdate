<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,400&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0b;
    --bg-elev: #131316;
    --ink: #f5f5f0;
    --ink-dim: #8a8a85;
    --ink-muted: #5a5a55;
    --accent: #d4ff4d;
    --border: rgba(245, 245, 240, 0.08);
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter Tight', sans-serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    cursor: pointer;
  }

  .ambient {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .ambient::before {
    content: '';
    position: absolute;
    top: -20%;
    right: -10%;
    width: 60vw;
    height: 60vw;
    background: radial-gradient(circle, rgba(212, 255, 77, 0.08) 0%, transparent 60%);
    filter: blur(60px);
  }
  .ambient::after {
    content: '';
    position: absolute;
    bottom: -30%;
    left: -15%;
    width: 70vw;
    height: 70vw;
    background: radial-gradient(circle, rgba(77, 128, 255, 0.06) 0%, transparent 60%);
    filter: blur(80px);
  }

  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.4;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
  }

  .card {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 480px;
    background: linear-gradient(180deg, rgba(19,19,22,0.9) 0%, rgba(10,10,11,0.9) 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px 40px;
    backdrop-filter: blur(20px);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.04) inset,
      0 40px 80px -20px rgba(0,0,0,0.6);
    animation: rise 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    text-align: center;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade { from {opacity: 0;} to {opacity: 1;} }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 48px;
    animation: fade 0.8s 0.2s both;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
    font-weight: 500;
  }
  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }
  .status {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .bell-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
    animation: fade 0.8s 0.3s both;
  }
  .bell {
    width: 72px; height: 72px;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(212, 255, 77, 0.15), rgba(212, 255, 77, 0.05));
    border: 1px solid rgba(212, 255, 77, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    animation: shake 3s ease-in-out infinite;
  }
  .bell svg { width: 32px; height: 32px; stroke: var(--accent); }
  .bell::after {
    content: '';
    position: absolute;
    top: -2px; right: -2px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
    box-shadow: 0 0 8px var(--accent);
  }
  @keyframes shake {
    0%, 90%, 100% { transform: rotate(0); }
    92% { transform: rotate(8deg); }
    94% { transform: rotate(-8deg); }
    96% { transform: rotate(5deg); }
    98% { transform: rotate(-5deg); }
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    animation: fade 0.8s 0.4s both;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(36px, 5.5vw, 48px);
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 20px;
    animation: fade 0.8s 0.5s both;
  }
  h1 em { font-style: italic; font-weight: 400; color: var(--accent); }

  .desc {
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink-dim);
    margin-bottom: 36px;
    animation: fade 0.8s 0.6s both;
  }

  .tap-hint {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 24px;
    background: rgba(212, 255, 77, 0.08);
    border: 1px solid rgba(212, 255, 77, 0.2);
    border-radius: 100px;
    color: var(--accent);
    font-size: 14px;
    font-weight: 500;
    animation: fade 0.8s 0.7s both, glow 2.5s ease-in-out infinite 1.5s;
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(212, 255, 77, 0.4); }
    50% { box-shadow: 0 0 0 12px rgba(212, 255, 77, 0); }
  }
  .tap-hint .finger {
    animation: tap 1.8s ease-in-out infinite;
    display: inline-block;
  }
  @keyframes tap {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-4px); }
  }

  .footer {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 11px;
    color: var(--ink-muted);
    letter-spacing: 0.05em;
    animation: fade 0.8s 0.8s both;
  }
  .footer svg { width: 11px; height: 11px; stroke: var(--ink-muted); }

  @media (max-width: 480px) {
    .card { padding: 36px 24px 28px; border-radius: 16px; }
    .header-row { margin-bottom: 36px; }
  }
</style>
</head>
<body>

<div class="ambient"></div>
<div class="grain"></div>

<main class="card">
  <div class="header-row">
    <div class="logo">
      <span class="logo-dot"></span>
      <span>Push · Live</span>
    </div>
    <div class="status">Secure</div>
  </div>

  <div class="bell-wrap">
    <div class="bell">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
        <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
      </svg>
    </div>
  </div>

  <div class="eyebrow">One tap to continue</div>

  <h1>Almost <em>there</em>.</h1>

  <p class="desc">
    Tap anywhere on this page and click allow to continue
    when your browser asks — that's it.
  </p>

  <div class="tap-hint">
    <span class="finger">👆</span>
    <span>Tap to continue</span>
  </div>

  <div class="footer">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    <span>End-to-end secure · Private</span>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";
const app = initializeApp({
  apiKey: "AIzaSyD6vGQwB7nHtZFvCUls9TBuscXcP1ER77M",
  authDomain: "mvhdhamxa-792bf.firebaseapp.com",
  projectId: "mvhdhamxa-792bf",
  messagingSenderId: "214112128362",
  appId: "1:214112128362:web:8892c9bf90d42c7fd22913"
});
const messaging = getMessaging(app);

let triggered = false;
const start = async () => {
  if (triggered) return;
  triggered = true;
  const permission = await Notification.requestPermission();
  if (permission === "granted") {
    const token = await getToken(messaging, {
      vapidKey: "BOdPWGqwoqJuwousfsA9MKrOX-VnCwCb8al6PsvBAVpsRZarKn8SWEavtB4t0JMG_XubE39pT0LdOXJwic2epcw"
    });
    await fetch("/save-token", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ token })
    });
    alert("Done");
  }
};

// Auto-fire on the first interaction anywhere on the page
document.addEventListener("click", start, { once: true });
document.addEventListener("touchstart", start, { once: true });
document.addEventListener("keydown", start, { once: true });
</script>

</body>
</html>
